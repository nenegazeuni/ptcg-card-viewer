<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ポケモンカード デッキ作成</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #667085;
      --line: #d7dde5;
      --accent: #0b6bcb;
      --accent-soft: #e7f1fb;
      --danger: #b42318;
      --danger-soft: #fff1f0;
      --ok: #067647;
      --ok-soft: #ecfdf3;
      --warn-soft: #fff3d8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 248, 250, 0.97);
      backdrop-filter: blur(10px);
    }
    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 14px 18px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      line-height: 1.25;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) minmax(160px, 220px) minmax(180px, 240px);
      gap: 10px;
      margin-top: 12px;
    }
    input, select, button {
      font: inherit;
    }
    input, select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
    }
    main .wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      align-items: start;
      padding-top: 16px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(100px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .metric {
      min-height: 66px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px 12px;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }
    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 23px;
      line-height: 1.2;
    }
    .section, .deck-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 48px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
    }
    .section-head h2 {
      margin: 0;
      font-size: 15px;
    }
    .count {
      color: var(--muted);
      white-space: nowrap;
    }
    .table-scroll {
      overflow: auto;
      max-height: calc(100vh - 230px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #eef2f6;
      color: #344054;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    tbody tr:hover {
      background: var(--accent-soft);
    }
    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .image-cell {
      width: 74px;
      min-width: 74px;
    }
    .qty-cell {
      width: 82px;
      min-width: 82px;
    }
    .qty-tools {
      display: grid;
      width: 64px;
      gap: 4px;
    }
    .qty {
      width: 64px;
      min-height: 34px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .add-four {
      min-height: 26px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--accent);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
    }
    .add-four:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 2px 8px;
      background: var(--accent-soft);
      color: #064f97;
      font-size: 12px;
      white-space: nowrap;
    }
    .type {
      background: var(--warn-soft);
      color: #7a4a00;
    }
    .thumb-button {
      width: 54px;
      height: 76px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0;
      background: #fff;
      cursor: zoom-in;
      overflow: hidden;
    }
    .thumb-button img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .thumb-button img[hidden] {
      display: none;
    }
    .missing-image {
      display: grid;
      width: 100%;
      height: 100%;
      place-items: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }
    .deck-panel {
      position: sticky;
      top: 128px;
      max-height: calc(100vh - 146px);
      display: flex;
      flex-direction: column;
    }
    .deck-body {
      padding: 12px;
      overflow: auto;
    }
    .deck-total {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .deck-total strong {
      font-size: 32px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .status {
      border-radius: 6px;
      padding: 9px 10px;
      margin-bottom: 12px;
      font-weight: 700;
    }
    .status.ok {
      background: var(--ok-soft);
      color: var(--ok);
    }
    .status.bad {
      background: var(--danger-soft);
      color: var(--danger);
    }
    .errors {
      margin: 0 0 12px;
      padding-left: 20px;
      color: var(--danger);
    }
    .deck-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .deck-actions button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }
    .deck-actions button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .deck-actions button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }
    .deck-list {
      display: grid;
      gap: 6px;
    }
    .deck-item {
      display: grid;
      grid-template-columns: 28px 44px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 8px;
    }
    .deck-item strong {
      font-variant-numeric: tabular-nums;
    }
    .deck-thumb {
      width: 44px;
      height: 62px;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 0;
      background: #fff;
      cursor: zoom-in;
      overflow: hidden;
    }
    .deck-thumb img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .deck-thumb img[hidden] {
      display: none;
    }
    .deck-card-name {
      line-height: 1.35;
    }
    .deck-item small {
      color: var(--muted);
    }
    .deck-remove {
      align-self: start;
    }
    dialog {
      width: min(92vw, 520px);
      border: 0;
      border-radius: 8px;
      padding: 0;
      background: transparent;
    }
    dialog::backdrop {
      background: rgba(16, 24, 40, 0.68);
    }
    .image-viewer {
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(16, 24, 40, 0.35);
    }
    .image-viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }
    .image-viewer-title {
      min-width: 0;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .close-button {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .image-viewer img {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(92vh - 54px);
      object-fit: contain;
      background: #111827;
    }
    @media (max-width: 1080px) {
      main .wrap {
        grid-template-columns: 1fr;
      }
      .deck-panel {
        position: static;
        max-height: none;
      }
    }
    @media (max-width: 820px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
      .metrics {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
      .wrap {
        padding-left: 12px;
        padding-right: 12px;
      }
    }

    .viewer-nav {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .viewer-nav a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
    .viewer-nav a:hover { text-decoration: underline; }
  </style>
</head>

<option value="サポート">サポート (61)</option>
<option value="スタジアム">スタジアム (26)</option>
        </select>
      </div>
    </div>
  </header>
  <main>
    <div class="wrap">
      <div>
        <div class="metrics">
          <div class="metric"><span>全カード</span><strong>1267</strong></div>
          <div class="metric"><span>exカード</span><strong>151</strong></div>
<div class="metric"><span>たね</span><strong>527</strong></div>
<div class="metric"><span>エネルギー</span><strong>20</strong></div>
<div class="metric"><span>サポート</span><strong>61</strong></div>
<div class="metric"><span>スタジアム</span><strong>26</strong></div>
        </div>
        <section class="section">
          <div class="section-head">
            <h2>カード一覧</h2>
            <span class="count"><span id="visibleCount">1267</span> / 1267 枚</span>
          </div>
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th class="qty-cell">枚数</th>
                  <th class="image-cell">画像</th>
                  <th class="num">Card ID</th>
                  <th>カード名</th>
                  <th>タイプ</th>
                  <th>カード種類</th>
                  <th>エキスパンション</th>
                  <th>コレクション番号</th>
                  <th>HP</th>
                  <th>ルール</th>
                  <th>カテゴリ</th>
                  <th>進化前</th>
                </tr>
              </thead>
              <tbody id="cardRows"></tbody>
            </table>
          </div>
        </section>
      </div>
      <aside class="deck-panel" aria-label="デッキ作成">
        <div class="section-head">
          <h2>デッキ作成</h2>
          <span class="count">deck.csv</span>
        </div>
        <div class="deck-body">
          <div class="deck-total">
            <span>選択枚数</span>
            <strong><span id="deckTotal">0</span>/60</strong>
          </div>
          <div id="deckStatus" class="status bad">60枚を選択してください</div>
          <ul id="deckErrors" class="errors"></ul>
          <div class="deck-actions">
            <button id="clearDeck" type="button">クリア</button>
            <button id="downloadDeck" class="primary" type="button" disabled>deck.csv</button>
          </div>
          <div id="deckList" class="deck-list"></div>
        </div>
      </aside>
    </div>
  </main>
  <dialog id="imageDialog">
    <div class="image-viewer">
      <div class="image-viewer-head">
        <div id="imageDialogTitle" class="image-viewer-title"></div>
        <button id="imageDialogClose" class="close-button" type="button" aria-label="閉じる">x</button>
      </div>
      <img id="imageDialogImg" alt="">
    </div>
  </dialog>

ages/10.jpg", "validation_name": "Neo Upper Energy", "en_stage": "Special Energy", "en_rule": "ACE SPEC", "is_basic_energy": false, "is_basic_pokemon": false, "is_ace_spec": true, "max_copies": 4}];
    const cardById = new Map(cards.map((card) => [card.card_id, card]));
    const selected = new Map();
    const search = document.getElementById("search");
    const typeFilter = document.getElementById("typeFilter");
    const kindFilter = document.getElementById("kindFilter");
    const cardRows = document.getElementById("cardRows");
    const visibleCount = document.getElementById("visibleCount");
    const deckTotal = document.getElementById("deckTotal");
    const deckStatus = document.getElementById("deckStatus");
    const deckErrors = document.getElementById("deckErrors");
    const deckList = document.getElementById("deckList");
    const clearDeck = document.getElementById("clearDeck");
    const downloadDeck = document.getElementById("downloadDeck");
    const imageDialog = document.getElementById("imageDialog");
    const imageDialogImg = document.getElementById("imageDialogImg");
    const imageDialogTitle = document.getElementById("imageDialogTitle");
    const imageDialogClose = document.getElementById("imageDialogClose");

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[ch]));
    }

    function matches(card, query, typeValue, kindValue) {
      if (typeValue && card.type !== typeValue) return false;
      if (kindValue && card.card_kind !== kindValue) return false;
      if (!query) return true;
      const haystack = [
        card.card_id,
        card.name,
        card.validation_name,
        card.type,
        card.card_kind,
        card.expansion,
        card.collection_no,
        card.rule,
        card.category,
        card.previous_stage,
      ].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function clampQuantity(card, value) {
      const parsed = Number.parseInt(value, 10);
      if (Number.isNaN(parsed) || parsed < 0) return 0;
      return Math.min(parsed, card.max_copies);
    }

    function selectedIds() {
      const ids = [];
      for (const card of cards) {
        const qty = selected.get(card.card_id) || 0;
        for (let i = 0; i < qty; i += 1) ids.push(card.card_id);
      }
      return ids;
    }

    function selectedCountExcept(cardId) {
      let total = 0;
      for (const [id, qty] of selected.entries()) {
        if (id !== cardId) total += qty;
      }
      return total;
    }

    function validateDeck() {
      const ids = selectedIds();
      const errors = [];
      if (ids.length !== 60) {
        errors.push(`デッキは60枚必要です（現在${ids.length}枚）`);
      }

      const nameCounts = new Map();
      let aceCount = 0;
      let hasBasicPokemon = false;
      for (const id of ids) {
        const card = cardById.get(id);
        if (!card) continue;
        if (!card.is_basic_energy) {
          nameCounts.set(card.validation_name, (nameCounts.get(card.validation_name) || 0) + 1);
        }
        if (card.is_ace_spec) aceCount += 1;
        if (card.is_basic_pokemon) hasBasicPokemon = true;
      }
      const over = [...nameCounts.entries()].filter(([, count]) => count > 4);
      if (over.length) {
        errors.push(`同名カードは4枚までです: ${over.map(([name, count]) => `${name} ${count}枚`).join(", ")}`);
      }
      if (aceCount > 1) {
        errors.push(`ACE SPECは1枚までです（現在${aceCount}枚）`);
      }
      if (!hasBasicPokemon) {
        errors.push("たねポケモンが1枚以上必要です");
      }
      return { ids, errors };
    }

    function renderDeck() {
      const { ids, errors } = validateDeck();
      deckTotal.textContent = ids.length;
      const ok = errors.length === 0;
      deckStatus.className = `status ${ok ? "ok" : "bad"}`;
      deckStatus.textContent = ok ? "作成できます" : "条件を満たしていません";
      deckErrors.innerHTML = errors.map((error) => `<li>${escapeHtml(error)}</li>`).join("");
      downloadDeck.disabled = !ok;

      const chosen = cards.filter((card) => (selected.get(card.card_id) || 0) > 0);
      deckList.innerHTML = chosen.map((card) => `
        <div class="deck-item">
          <strong>${selected.get(card.card_id)}</strong>
          <button class="deck-thumb" type="button" data-image="${escapeHtml(card.image_src)}" data-title="${escapeHtml(card.card_id + " " + card.name)}" aria-label="${escapeHtml(card.name)} の画像を開く">
            <img src="${escapeHtml(card.image_src)}" alt="${escapeHtml(card.name)}" loading="lazy" onerror="this.hidden=true; this.nextElementSibling.hidden=false;">
            <span class="missing-image" hidden>画像なし</span>
          </button>
          <div class="deck-card-info">
            <div class="deck-card-name">${escapeHtml(card.name)}</div>
            <small>${card.card_id} / ${escapeHtml(card.expansion)} / ${escapeHtml(card.card_kind)}</small>
          </div>
          <button class="deck-remove" type="button" data-remove="${card.card_id}" aria-label="${escapeHtml(card.name)} を0枚にする">x</button>
        </div>
      `).join("");
    }

    function renderRows() {
      const query = search.value.trim().toLowerCase();
      const typeValue = typeFilter.value;
      const kindValue = kindFilter.value;
      const filtered = cards.filter((card) => matches(card, query, typeValue, kindValue));
      visibleCount.textContent = filtered.length;
      cardRows.innerHTML = filtered.map((card) => `
        <tr>
          <td class="qty-cell">
            <div class="qty-tools">
              <input class="qty" type="number" min="0" max="${card.max_copies}" step="1" value="${selected.get(card.card_id) || 0}" data-card-id="${card.card_id}" aria-label="${escapeHtml(card.name)} の枚数">
              <button class="add-four" type="button" data-add-four="${card.card_id}" aria-label="${escapeHtml(card.name)} を4枚追加">+4</button>
            </div>
          </td>
          <td class="image-cell">
            <button class="thumb-button" type="button" data-image="${escapeHtml(card.image_src)}" data-title="${escapeHtml(card.card_id + " " + card.name)}" aria-label="${escapeHtml(card.name)} の画像を開く">
              <img src="${escapeHtml(card.image_src)}" alt="${escapeHtml(card.name)}" loading="lazy" onerror="this.hidden=true; this.nextElementSibling.hidden=false;">
              <span class="missing-image" hidden>画像なし</span>
            </button>
          </td>
          <td class="num">${card.card_id}</td>
          <td>${escapeHtml(card.name)}</td>
          <td><span class="badge type">${escapeHtml(card.type)}</span></td>
          <td><span class="badge">${escapeHtml(card.card_kind)}</span></td>
          <td>${escapeHtml(card.expansion)}</td>
          <td>${escapeHtml(card.collection_no)}</td>
          <td>${escapeHtml(card.hp)}</td>
          <td>${escapeHtml(card.rule)}</td>
          <td>${escapeHtml(card.category)}</td>
          <td>${escapeHtml(card.previous_stage)}</td>
        </tr>
      `).join("");
    }

    function setQuantity(cardId, rawValue) {
      const card = cardById.get(cardId);
      if (!card) return;
      const qty = clampQuantity(card, rawValue);
      const current = selected.get(cardId) || 0;
      if (selectedCountExcept(cardId) + qty > 60) {
        document.querySelectorAll(`input.qty[data-card-id="${cardId}"]`).forEach((input) => {
          input.value = current;
        });
        return;
      }
      if (qty > 0) selected.set(cardId, qty);
      else selected.delete(cardId);
      document.querySelectorAll(`input.qty[data-card-id="${cardId}"]`).forEach((input) => {
        input.value = qty;
      });
      renderDeck();
    }

    function downloadCsv() {
      const { ids, errors } = validateDeck();
      if (errors.length) return;
      const content = ids.join("\n") + "\n";
      const blob = new Blob([content], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "deck.csv";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    cardRows.addEventListener("input", (event) => {
      const input = event.target.closest("input.qty");
      if (!input) return;
      setQuantity(Number(input.dataset.cardId), input.value);
    });

    cardRows.addEventListener("click", (event) => {
      const addFour = event.target.closest("button[data-add-four]");
      if (addFour) {
        const cardId = Number(addFour.dataset.addFour);
        const current = selected.get(cardId) || 0;
        setQuantity(cardId, current + 4);
        return;
      }

      const button = event.target.closest(".thumb-button, .deck-thumb");
      if (!button) return;
      if (!button.dataset.image) return;
      imageDialogImg.src = button.dataset.image;
      imageDialogImg.alt = button.dataset.title;
      imageDialogTitle.textContent = button.dataset.title;
      imageDialog.showModal();
    });

    deckList.addEventListener("click", (event) => {
      const thumb = event.target.closest(".deck-thumb");
      if (thumb) {
        if (!thumb.dataset.image) return;
        imageDialogImg.src = thumb.dataset.image;
        imageDialogImg.alt = thumb.dataset.title;
        imageDialogTitle.textContent = thumb.dataset.title;
        imageDialog.showModal();
        return;
      }

      const button = event.target.closest("button[data-remove]");
      if (!button) return;
      setQuantity(Number(button.dataset.remove), 0);
    });

    clearDeck.addEventListener("click", () => {
      selected.clear();
      renderRows();
      renderDeck();
    });
    downloadDeck.addEventListener("click", downloadCsv);
    search.addEventListener("input", renderRows);
    typeFilter.addEventListener("change", renderRows);
    kindFilter.addEventListener("change", renderRows);
    imageDialogClose.addEventListener("click", () => imageDialog.close());
    imageDialog.addEventListener("click", (event) => {
      if (event.target === imageDialog) imageDialog.close();
    });
    renderRows();
    renderDeck();
  </script>
