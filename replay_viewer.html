<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTCG Replay Visualizer JP</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1b232c; --panel2:#222d38; --line:#33414f;
    --txt:#e6edf3; --dim:#8b98a5; --accent:#4aa3ff; --p0:#3a6df0; --p1:#e0533d;
    --hpgood:#3fb950; --hpmid:#d29922; --hpbad:#f85149;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI",Meiryo,system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:13px;}
  header{position:sticky;top:0;z-index:5;background:var(--panel);border-bottom:1px solid var(--line);
         padding:8px 12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  header h1{font-size:15px;margin:0;color:var(--accent);white-space:nowrap;}
  button{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:6px;
         padding:5px 11px;cursor:pointer;font-size:13px;}
  button:hover{background:#2c3a48;}
  button:disabled{opacity:.4;cursor:default;}
  #slider{flex:1;min-width:160px;}
  .meta{color:var(--dim);}
  .meta b{color:var(--txt);}
  #wrap{display:grid;grid-template-columns:1fr 360px;gap:10px;padding:10px;align-items:start;}
  @media(max-width:1000px){#wrap{grid-template-columns:1fr;}}
  .board{display:flex;flex-direction:column;gap:8px;}
  .player{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 10px;}
  .player.p0{border-top:3px solid var(--p0);}
  .player.p1{border-top:3px solid var(--p1);}
  .player.p0.turn{box-shadow:0 0 0 2px var(--p0),0 0 16px #3a6df088;}
  .player.p1.turn{box-shadow:0 0 0 2px var(--p1),0 0 16px #e0533d88;}
  .turnflag{font-weight:700;font-size:11px;color:#fff;border-radius:5px;padding:1px 7px;background:var(--accent);}
  .player.p0 .turnflag{background:var(--p0);} .player.p1 .turnflag{background:var(--p1);}
  .prow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
  .tag{font-weight:700;padding:1px 8px;border-radius:5px;}
  .tag.p0{background:var(--p0);} .tag.p1{background:var(--p1);}
  .counts{color:var(--dim);display:flex;gap:10px;flex-wrap:wrap;}
  .counts b{color:var(--txt);}
  .zone-label{color:var(--dim);font-size:11px;margin:4px 0 2px;}
  .cards{display:flex;gap:6px;flex-wrap:wrap;min-height:4px;}
  /* card */
  .card{position:relative;width:74px;height:103px;border-radius:6px;background:var(--panel2);
        border:1px solid var(--line);overflow:hidden;flex:none;}
  .card.active{width:92px;height:128px;border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
  .card.small{width:54px;height:75px;}
  .card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
  .card .txt{position:absolute;inset:0;padding:4px;display:flex;flex-direction:column;gap:2px;}
  .card .nm{font-size:10px;line-height:1.15;font-weight:600;max-height:36px;overflow:hidden;}
  .card .stat{margin-top:auto;display:flex;flex-direction:column;gap:2px;}
  .card .hp{font-size:10px;color:var(--dim);}
  .card.faceup .txt{background:linear-gradient(180deg,#263340,#1a232c);}
  .card.hasimg img{display:block;}            /* reveal art once it has loaded */
  .card.hasimg .txt{background:none;}         /* image present: clear the panel bg so the art shows (all cards) */
  .card.mon.hasimg .txt{background:linear-gradient(180deg,transparent 38%,rgba(0,0,0,.8) 100%);} /* battle & bench only: bottom shade for HP/energy */
  .card.hasimg .nm{display:none;}             /* name is redundant with the art */
  .card.hasimg .hp{color:var(--txt);text-shadow:0 1px 2px #000;}
  .hpbar{height:4px;border-radius:3px;background:#30363d;overflow:hidden;margin-top:2px;}
  .hpbar>i{display:block;height:100%;}
  .energies{display:flex;gap:2px;flex-wrap:wrap;margin-top:2px;}
  .en{width:13px;height:13px;border-radius:50%;font-size:9px;line-height:13px;text-align:center;color:#0b0b0b;font-weight:700;}
  .badges{position:absolute;top:2px;right:2px;display:flex;flex-direction:column;gap:2px;align-items:flex-end;}
  .badge{font-size:9px;padding:0 4px;border-radius:4px;background:#000a;border:1px solid var(--line);}
  .badge.sc{background:#7b1fa2;} .badge.tool{background:#00695c;} .badge.ex{background:#b8860b;}
  .stadium{text-align:center;color:var(--dim);padding:2px;}
  .stadium b{color:var(--txt);}
  .stadium[data-id]{cursor:help;}
  .side{display:flex;flex-direction:column;gap:10px;}
  .logbox,.selbox{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 10px;}
  .logbox h3,.selbox h3{margin:0 0 6px;font-size:12px;color:var(--accent);}
  .log{white-space:pre-wrap;font-family:Consolas,monospace;font-size:12px;line-height:1.5;max-height:46vh;overflow:auto;}
  .log .res{color:var(--hpgood);font-weight:700;}
  .log .atk{color:#ffb454;} .log .hp{color:#ff7b72;}
  .selbox .sel{font-family:Consolas,monospace;color:#ffb454;}
  #drop{position:fixed;inset:0;background:#000c;display:flex;align-items:center;justify-content:center;
        flex-direction:column;gap:14px;z-index:20;}
  #drop .box{border:2px dashed var(--accent);border-radius:14px;padding:40px 60px;text-align:center;color:var(--txt);}
  #drop.hide{display:none;}
  .hint{color:var(--dim);font-size:12px;}
  code{background:#0d1117;padding:1px 5px;border-radius:4px;}
  /* hover preview */
  #preview{position:fixed;left:0;top:0;z-index:30;display:none;width:auto;pointer-events:none;
           background:var(--panel);border:1px solid var(--accent);border-radius:10px;padding:6px;
           box-shadow:0 10px 30px #000b;}
  #preview .pvrow{display:flex;gap:8px;align-items:flex-start;}
  #preview .pvmain{width:240px;flex:none;}
  #preview img{display:block;width:100%;border-radius:6px;background:var(--panel2);}
  #preview .cap{margin-top:6px;font-size:12px;line-height:1.4;color:var(--txt);}
  #preview .cap .sub{color:var(--dim);margin-top:2px;}
  /* attached energy as cards: same energy fanned/overlapped; groups laid out horizontally, separated by a ×N count */
  #preview .pvenergy{margin-top:6px;display:flex;flex-wrap:wrap;align-items:center;gap:6px 10px;}
  #preview .egroup{display:flex;align-items:center;gap:6px;}
  #preview .estack{display:inline-flex;}
  #preview .estack img{width:72px;border-radius:5px;background:var(--panel2);box-shadow:0 1px 5px #000a;}
  #preview .estack img:not(:first-child){margin-left:-52px;}
  #preview .ecount{font-size:12px;font-weight:700;color:var(--dim);}
  /* attached tools as full-size panels on the right */
  #preview .pvtools{flex-direction:column;gap:8px;width:240px;flex:none;}
  #preview .pvtools .tname{font-size:12px;color:var(--dim);margin-top:4px;line-height:1.35;}
  /* clickable zone (trash) + grid modal */
  .zone-open{cursor:pointer;border:1px solid var(--line);border-radius:5px;padding:0 6px;}
  .zone-open:hover{background:#2c3a48;border-color:var(--accent);}
  .zoom{position:fixed;inset:0;z-index:25;background:#000b;display:flex;align-items:flex-start;justify-content:center;padding-top:5vh;}
  .zoom.hide{display:none;}
  .zoom-box{display:flex;flex-direction:column;width:min(92vw,900px);min-height:70vh;max-height:86vh;
            background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;}
  .zoom-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  #zoom-title{font-size:14px;font-weight:700;color:var(--accent);}
  .zoom-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:8px;
             justify-items:center;align-content:flex-start;flex:1;min-height:0;overflow:auto;}

#viewer-home-nav{display:flex;gap:10px;align-items:center;font-size:12px;}
#viewer-home-nav a{color:var(--accent);font-weight:700;text-decoration:none;}
#viewer-home-nav a:hover{text-decoration:underline;}
</style>
</head>
<body>
<header>
<nav id="viewer-home-nav"><a href="./">トップへ</a><span>/</span><a href="replays/">リプレイ一覧へ</a><span>/</span><a href="card_list.html">カード一覧へ</a></nav>

  <h1>PTCG Replay</h1>
  <button id="prev" data-i18n="prev">◀ 前へ</button>
  <input id="slider" type="range" min="0" max="0" value="0">
  <button id="next" data-i18n="next">次へ ▶</button>
  <span class="meta"><span data-i18n="step">手数</span> <b id="stepno">0/0</b></span>
  <span class="meta"><span data-i18n="turn">ターン</span> <b id="turn">-</b></span>
  <span class="meta"><span data-i18n="active">手番</span> <b id="active">-</b></span>
  <span class="meta"><span data-i18n="ctx">ctx</span> <b id="ctx">-</b></span>
  <span class="meta" id="result"></span>
  <button id="loadbtn" data-i18n="openFile">ファイルを開く</button>
  <button id="langbtn">EN</button>
  <input id="file" type="file" accept=".json" style="display:none">
</header>

<div id="wrap" style="display:none">
  <div class="board">
    <div class="player p1" id="panel1"></div>
    <div class="stadium" id="stadium"></div>
    <div class="player p0" id="panel0"></div>
  </div>
  <div class="side">
    <div class="selbox">
      <h3 data-i18n="selectedTitle">この手で選んだアクション</h3>
      <div class="sel" id="selected">-</div>
    </div>
    <div class="logbox">
      <h3 data-i18n="logTitle">ログ（この選択まで）</h3>
      <div class="log" id="log"></div>
    </div>
  </div>
</div>

<div id="drop"><div class="box">
  <div style="font-size:18px;" data-i18n="dropTitle">リプレイ JSON をドロップ</div>
  <div class="hint"><span data-i18n="or">または</span> <button id="pick" data-i18n="chooseFile">ファイルを選択</button></div>
  <div class="hint" data-i18n-html="dropHint"><code>visualize_data()</code> が出力したリプレイ JSON を読み込みます</div>
</div></div>

<div id="preview"><div class="pvrow"><div class="pvmain"><img id="pvimg" alt=""><div class="cap" id="pvcap"></div><div class="pvenergy" id="pvenergy"></div></div><div class="pvtools" id="pvtools"></div></div></div>

<div id="zoom" class="zoom hide"><div class="zoom-box"><div class="zoom-head"><span id="zoom-title">トラッシュ</span><button id="zoom-close" data-i18n="close">✕ 閉じる</button></div><div class="zoom-grid" id="zoom-grid"></div></div></div>

<script>
// ---- enums / lookups ----
const ENERGY = {0:['C','#b8b8b8'],1:['G','#4caf50'],2:['R','#f44336'],3:['W','#2196f3'],
  4:['L','#fbc02d'],5:['P','#9c27b0'],6:['F','#c66a2e'],7:['D','#455a64'],8:['M','#90a4ae'],
  9:['N','#c0a020'],10:['*','#e0e0e0'],11:['TR','#8d6e63']};
// ---- i18n (EN / JA) ----
let LANG='ja'; try{ LANG=localStorage.getItem('ptcg_lang')||'ja'; }catch(e){}
const I18N={
  ja:{
    prev:'◀ 前へ', next:'次へ ▶', step:'手数', turn:'ターン', active:'手番', ctx:'ctx', openFile:'ファイルを開く',
    dropTitle:'リプレイ JSON をドロップ', or:'または', chooseFile:'ファイルを選択',
    dropHint:'<code>visualize_data()</code> が出力したリプレイ JSON を読み込みます',
    selectedTitle:'この手で選んだアクション', logTitle:'ログ（この選択まで）',
    close:'✕ 閉じる', discardEmpty:'（トラッシュは空です）', discardTitle:(p,c)=>`P${p} トラッシュ（${c}枚）`,
    deck:'山札', hand:'手札', prize:'サイド', discard:'トラッシュ', turnFlag:'▶ 手番',
    battle:'バトル場', bench:'ベンチ', noBench:'（ベンチなし）', noHand:'（手札なし）', clickDiscard:'クリックでトラッシュ一覧',
    none:'(なし)', facedown:'(裏)', tool:'道具', stadium:'スタジアム', none2:'なし',
    draw:'引分', win:p=>`P${p} 勝利`, notArray:'スナップショット配列ではありません',
    poisoned:'毒', burned:'やけど', asleep:'眠', paralyzed:'麻', confused:'混',
    area:{1:'山札',2:'手札',3:'トラッシュ',4:'バトル場',5:'ベンチ',6:'サイド',7:'スタジアム',8:'エネ',9:'どうぐ',10:'進化元',11:'P',12:'確認中'},
    reason:{1:'サイド0枚',2:'山札切れ',3:'場のポケモン全滅',4:'カード効果'},
    lShuffle:p=>`${p}: 山札シャッフル`, lMulligan:p=>`${p}: たねポケモンなし(マリガン)`,
    lTurnStart:p=>`\n--- ${p} ターン開始 ---`, lTurnEnd:p=>`--- ${p} ターン終了 ---`,
    lDraw:(p,c)=>`${p}: ドロー ${c}`, lDrawReverse:p=>`${p}: ドロー(相手・非公開)`,
    lMoveCard:(p,c,f,to)=>`${p}: ${c} 移動 ${f}→${to}`, lMoveCardReverse:(p,f,to)=>`${p}: 非公開カード移動 ${f}→${to}`,
    lSwitch:(p,a,b)=>`${p}: 入れ替え ${a}⇄${b}`, lChange:(p,a,b)=>`${p}: ポケモン変更 ${a}→${b}`,
    lPlay:(p,c)=>`${p}: プレイ ${c}`, lAttach:(p,c,tg)=>`${p}: ${c} を ${tg} に付ける`,
    lEvolve:(p,tg,c)=>`${p}: 進化 ${tg}→${c}`, lDevolve:(p,tg,c)=>`${p}: 退化 ${tg}→${c}`,
    lMoveAttached:(p,c)=>`${p}: 付与カード移動 ${c}`, lAttack:(p,c,id)=>`${p}: ${c} のワザ (id ${id})`,
    lHp:(p,c,v,dc)=>`${p}: ${c} HP ${v}${dc}`, dmgCounter:' [ダメカン]',
    lStatus:(p,c,sc,r)=>`${p}: ${c} ${sc}${r}`,
    poisonedV:'どく', burnedV:'やけど', asleepV:'ねむり', paralyzedV:'まひ', confusedV:'こんらん', recover:'回復',
    lCoin:(p,h)=>`${p}: コイン ${h}`, heads:'おもて', tails:'うら',
    lResult:(who,r)=>`\n=== 結果: ${who}（${r}）===`, resWin:p=>`P${p} の勝ち`, resDraw:'引き分け',
  },
  en:{
    prev:'◀ Prev', next:'Next ▶', step:'step', turn:'turn', active:'active', ctx:'ctx', openFile:'Open file',
    dropTitle:'Drop replay JSON', or:'or', chooseFile:'Choose file',
    dropHint:'Loads a replay JSON produced by <code>visualize_data()</code>',
    selectedTitle:'Selected action (this step)', logTitle:'Log (up to this choice)',
    close:'✕ Close', discardEmpty:'(discard is empty)', discardTitle:(p,c)=>`P${p} Discard (${c})`,
    deck:'Deck', hand:'Hand', prize:'Prize', discard:'Discard', turnFlag:'▶ Turn',
    battle:'Active', bench:'Bench', noBench:'(no bench)', noHand:'(no hand)', clickDiscard:'Click to view discard',
    none:'(none)', facedown:'(face down)', tool:'Tool', stadium:'Stadium', none2:'none',
    draw:'Draw', win:p=>`P${p} wins`, notArray:'Not a snapshot array',
    poisoned:'PSN', burned:'BRN', asleep:'SLP', paralyzed:'PAR', confused:'CNF',
    area:{1:'Deck',2:'Hand',3:'Discard',4:'Active',5:'Bench',6:'Prize',7:'Stadium',8:'Energy',9:'Tool',10:'Pre-evo',11:'P',12:'Checking'},
    reason:{1:'No prizes left',2:'Deck out',3:'No Pokémon in play',4:'Card effect'},
    lShuffle:p=>`${p}: shuffle deck`, lMulligan:p=>`${p}: no Basic Pokémon (mulligan)`,
    lTurnStart:p=>`\n--- ${p} turn start ---`, lTurnEnd:p=>`--- ${p} turn end ---`,
    lDraw:(p,c)=>`${p}: draw ${c}`, lDrawReverse:p=>`${p}: draw (opponent, hidden)`,
    lMoveCard:(p,c,f,to)=>`${p}: ${c} moved ${f}→${to}`, lMoveCardReverse:(p,f,to)=>`${p}: hidden card moved ${f}→${to}`,
    lSwitch:(p,a,b)=>`${p}: switch ${a}⇄${b}`, lChange:(p,a,b)=>`${p}: change ${a}→${b}`,
    lPlay:(p,c)=>`${p}: play ${c}`, lAttach:(p,c,tg)=>`${p}: attach ${c} to ${tg}`,
    lEvolve:(p,tg,c)=>`${p}: evolve ${tg}→${c}`, lDevolve:(p,tg,c)=>`${p}: devolve ${tg}→${c}`,
    lMoveAttached:(p,c)=>`${p}: move attached ${c}`, lAttack:(p,c,id)=>`${p}: ${c}'s attack (id ${id})`,
    lHp:(p,c,v,dc)=>`${p}: ${c} HP ${v}${dc}`, dmgCounter:' [dmg counter]',
    lStatus:(p,c,sc,r)=>`${p}: ${c} ${sc}${r}`,
    poisonedV:'poisoned', burnedV:'burned', asleepV:'asleep', paralyzedV:'paralyzed', confusedV:'confused', recover:' (recovered)',
    lCoin:(p,h)=>`${p}: coin ${h}`, heads:'heads', tails:'tails',
    lResult:(who,r)=>`\n=== Result: ${who} (${r}) ===`, resWin:p=>`P${p} wins`, resDraw:'Draw',
  }
};
function T(key,...args){ const v=(I18N[LANG]||I18N.ja)[key]; return typeof v==='function'?v(...args):(v!=null?v:key); }
function applyStaticI18n(){
  document.documentElement.lang=LANG;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=T(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{ el.innerHTML=T(el.dataset.i18nHtml); });
}
function setLang(l){
  LANG=l; try{localStorage.setItem('ptcg_lang',l);}catch(e){}
  const b=document.getElementById('langbtn'); if(b) b.textContent=(LANG==='ja'?'EN':'日本語');
  applyStaticI18n(); if(SNAP.length) render();
}
// NOTE: visualize_data() serializes enums as STRINGS in logs/select (e.g. "Draw","Main"),
// while areas/energies stay as ints. The decoder below switches on the string type.
// card art follows the UI language: ja -> assets/cards_jp/<id>.jpg, en -> assets/cards/<id>.jpg
function cardImgUrl(id){ return 'images/'+id+'.jpg'; }

let SNAP=[], idx=0, names={}, attacks={};

// ---- loading ----
const drop=document.getElementById('drop'), wrap=document.getElementById('wrap');
function loadText(text){
  try{ SNAP = JSON.parse(text); }catch(e){ alert('JSON parse error: '+e); return; }
  if(!Array.isArray(SNAP)||!SNAP.length){ alert(T('notArray')); return; }
  // build id->name from every card seen
  names={};
  for(const s of SNAP){ collectNames(s.current); }
  idx=0;
  document.getElementById('slider').max = SNAP.length-1;
  drop.classList.add('hide'); wrap.style.display='grid';
  pinHeaderWidths();
  render();
}
function collectNames(cur){
  if(!cur) return;
  for(const p of cur.players||[]){
    for(const z of ['active','bench','hand','deck','discard','prize']){
      for(const c of p[z]||[]){ if(c&&c.id!=null&&c.name) names[c.id]=c.name;
        for(const sub of (c.energyCards||[]).concat(c.tools||[],c.preEvolution||[])) if(sub&&sub.name) names[sub.id]=sub.name;
      }
    }
  }
  for(const c of cur.stadium||[]) if(c&&c.name) names[c.id]=c.name;
}
function nm(id){ return (names[id]||'?')+'(#'+id+')'; }

// ---- file pickers ----
document.getElementById('file').addEventListener('change',e=>{
  const f=e.target.files[0]; if(f) f.text().then(loadText);
});
function pick(){ document.getElementById('file').click(); }
document.getElementById('pick').onclick=pick;
document.getElementById('loadbtn').onclick=pick;
window.addEventListener('dragover',e=>{e.preventDefault(); drop.classList.remove('hide');});
window.addEventListener('drop',e=>{
  e.preventDefault();
  const f=e.dataTransfer.files[0];
  if(f) f.text().then(loadText); else drop.classList.toggle('hide', SNAP.length>0);
});

// ---- navigation ----
function go(d){ idx=Math.max(0,Math.min(SNAP.length-1, idx+d)); render(); }
document.getElementById('prev').onclick=()=>go(-1);
document.getElementById('next').onclick=()=>go(1);
document.getElementById('slider').oninput=e=>{ idx=+e.target.value; render(); };
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeZoom(); return; }
  if(e.key==='ArrowLeft')go(-1); else if(e.key==='ArrowRight')go(1);
});

// ---- hover preview (large card) ----
const preview=document.getElementById('preview'),
      pvImg=document.getElementById('pvimg'),
      pvCap=document.getElementById('pvcap'),
      pvEnergy=document.getElementById('pvenergy'),
      pvTools=document.getElementById('pvtools');
let pvId=null;
pvImg.onload =()=>{ pvImg.style.display='block'; };
pvImg.onerror=()=>{ pvImg.style.display='none'; };   // no art → caption only
// energy cards grouped by id: same id fanned/overlapped; groups laid out horizontally, separated by a ×N count
function energyCardsHtml(ids){
  const order=[], n={};
  for(const id of ids){ if(!(id in n)){ n[id]=0; order.push(id); } n[id]++; }
  return order.map(id=>{
    const imgs=Array.from({length:n[id]},()=>`<img src="${cardImgUrl(id)}" onerror="this.remove()" title="${nm(id)}">`).join('');
    const cnt=`<span class="ecount">×${n[id]}</span>`;
    return `<div class="egroup"><span class="estack">${imgs}</span>${cnt}</div>`;
  }).join('');
}
function showPreview(card){
  const id=card.dataset.id;
  if(id!==pvId){
    pvId=id;
    pvImg.style.display='block';
    pvImg.src=cardImgUrl(id);
    let cap=`<b>${nm(id)}</b>`;
    if(card.dataset.hp!=null) cap+=`<div class="sub">HP ${card.dataset.hp}/${card.dataset.mhp}</div>`;
    pvCap.innerHTML=cap;
    const encards=card.dataset.encards?card.dataset.encards.split(','):[];
    pvEnergy.innerHTML=encards.length?energyCardsHtml(encards):'';
    pvEnergy.style.display=encards.length?'flex':'none';
    const tools=card.dataset.tools?card.dataset.tools.split(','):[];
    pvTools.innerHTML=tools.length
      ? tools.map(t=>`<div class="ptool"><img src="${cardImgUrl(t)}" onerror="this.remove()"><div class="tname">${nm(t)}</div></div>`).join('')
      : '';
    pvTools.style.display=tools.length?'flex':'none';
  }
  preview.style.display='block';
}
function hidePreview(){ if(pvId!==null){ preview.style.display='none'; pvId=null; } }
function movePreview(e){
  const pad=16, w=preview.offsetWidth, h=preview.offsetHeight;
  let x=e.clientX+pad, y=e.clientY+pad;
  if(x+w>innerWidth)  x=e.clientX-pad-w;
  if(y+h>innerHeight) y=Math.max(6, innerHeight-h-6);
  preview.style.left=x+'px'; preview.style.top=y+'px';
}
wrap.addEventListener('mousemove',e=>{
  const card=e.target.closest('[data-id]');
  if(card){ showPreview(card); movePreview(e); }
  else hidePreview();
});
wrap.addEventListener('mouseleave',hidePreview);

// ---- trash (discard) grid modal ----
const zoom=document.getElementById('zoom');
let zoomPi=null;
function renderZoom(){
  if(zoomPi===null) return;
  const cards=SNAP[idx].current.players[zoomPi].discard||[];
  document.getElementById('zoom-title').textContent=T('discardTitle',zoomPi,cards.length);
  document.getElementById('zoom-grid').innerHTML=cards.length
    ? cards.map(c=>plainCard(c)).join('')
    : `<span class="hint">${T('discardEmpty')}</span>`;
}
function openZoom(pi){ zoomPi=pi; renderZoom(); zoom.classList.remove('hide'); }
function closeZoom(){ zoomPi=null; zoom.classList.add('hide'); hidePreview(); }
wrap.addEventListener('click',e=>{
  const z=e.target.closest('.zone-open');
  if(z) openZoom(+z.dataset.pi);
});
document.getElementById('zoom-close').onclick=closeZoom;
zoom.addEventListener('click',e=>{ if(e.target===zoom) closeZoom(); });   // click backdrop to close
zoom.addEventListener('mousemove',e=>{                                    // hover a grid card → large preview
  const card=e.target.closest('[data-id]');
  if(card){ showPreview(card); movePreview(e); } else hidePreview();
});

// ---- card rendering ----
function energyDots(list){
  if(!list||!list.length) return '';
  return '<div class="energies">'+list.map(t=>{
    const [lbl,col]=ENERGY[t]||['?','#888'];
    return `<span class="en" style="background:${col}" title="${lbl}">${lbl}</span>`;
  }).join('')+'</div>';
}
function hpBar(hp,max){
  const r=max?Math.max(0,hp/max):0;
  const col=r>.5?'var(--hpgood)':r>.25?'var(--hpmid)':'var(--hpbad)';
  return `<div class="hpbar"><i style="width:${(r*100).toFixed(0)}%;background:${col}"></i></div>`;
}
// p: Pokemon object. opts: {active, status:[...]}
function pokemonCard(p, opts={}){
  if(!p) return `<div class="card ${opts.active?'active':''} faceup"><div class="txt"><div class="nm">${T('none')}</div></div></div>`;
  const cls='card mon'+(opts.active?' active':'')+' faceup';   // 'mon' = battle/bench pokemon (gets the HP shade)
  const url=cardImgUrl(p.id);
  const badges=[];
  for(const s of (opts.status||[])) badges.push(`<span class="badge sc">${s}</span>`);
  for(const t of (p.tools||[])) badges.push(`<span class="badge tool" title="${nm(t.id)}">${T('tool')}</span>`);
  const img = url?`<img src="${url}" onload="this.parentElement.classList.add('hasimg')" onerror="this.remove()">`:'';
  return `<div class="${cls}" title="${nm(p.id)} HP${p.hp}/${p.maxHp}" data-id="${p.id}" data-hp="${p.hp}" data-mhp="${p.maxHp}" data-encards="${(p.energyCards||[]).map(e=>e.id).join(',')}" data-tools="${(p.tools||[]).map(t=>t.id).join(',')}">
    ${img}
    <div class="badges">${badges.join('')}</div>
    <div class="txt">
      <div class="nm">${p.name||nm(p.id)}</div>
      <div class="stat">
        ${energyDots(p.energies)}
        <div class="hp">HP ${p.hp}/${p.maxHp}</div>
        ${hpBar(p.hp,p.maxHp)}
      </div>
    </div>
  </div>`;
}
function plainCard(c, small){
  if(!c) return `<div class="card ${small?'small':''} faceup"><div class="txt"><div class="nm">${T('facedown')}</div></div></div>`;
  const url=cardImgUrl(c.id);
  const img = url?`<img src="${url}" onload="this.parentElement.classList.add('hasimg')" onerror="this.remove()">`:'';
  return `<div class="card ${small?'small':''} faceup" title="${nm(c.id)}" data-id="${c.id}">${img}<div class="txt"><div class="nm">${c.name||nm(c.id)}</div></div></div>`;
}

function statusOf(ps){
  return ['poisoned','burned','asleep','paralyzed','confused'].filter(k=>ps[k]).map(k=>T(k));
}

function renderPlayer(el, ps, who, isTurn){
  const st=statusOf(ps);
  const benchHtml = (ps.bench&&ps.bench.length)
      ? ps.bench.map(b=>pokemonCard(b)).join('') : `<span class="hint">${T('noBench')}</span>`;
  const handHtml = (ps.hand&&ps.hand.length)
      ? ps.hand.map(c=>plainCard(c,true)).join('') : `<span class="hint">${T('noHand')}</span>`;
  el.className='player '+who+(isTurn?' turn':'');
  el.innerHTML=`
    <div class="prow">
      <span class="tag ${who}">${who.toUpperCase()}</span>
      ${isTurn?`<span class="turnflag">${T('turnFlag')}</span>`:''}
      <div class="counts">
        <span>${T('deck')} <b>${ps.deckCount}</b></span>
        <span>${T('hand')} <b>${ps.handCount}</b></span>
        <span>${T('prize')} <b>${ps.prize?ps.prize.length:0}</b></span>
        ${(ps.discard&&ps.discard.length)
          ? `<span class="zone-open" data-pi="${who==='p0'?0:1}" title="${T('clickDiscard')}">${T('discard')} <b>${ps.discard.length}</b></span>`
          : `<span>${T('discard')} <b>0</b></span>`}
      </div>
    </div>
    <div class="prow" style="align-items:flex-end">
      <div>
        <div class="zone-label">${T('battle')}</div>
        <div class="cards">${(ps.active&&ps.active.length)?pokemonCard(ps.active[0],{active:true,status:st}):pokemonCard(null,{active:true})}</div>
      </div>
      <div style="flex:1">
        <div class="zone-label">${T('bench')} (${ps.bench?ps.bench.length:0}/${ps.benchMax})</div>
        <div class="cards">${benchHtml}</div>
      </div>
    </div>
    <div class="zone-label">${T('hand')}</div>
    <div class="cards">${handHtml}</div>`;
}

// ---- log decoding (string-typed events from visualize_data) ----
function P(ev){ return ev.playerIndex!=null?('P'+ev.playerIndex):''; }
function area(a){ return (I18N[LANG]||I18N.ja).area[a]||('area'+a); }
function decode(ev){
  const p=P(ev);
  switch(ev.type){
    case 'Shuffle': return T('lShuffle',p);
    case 'HasBasicPokemon': return ev.hasBasicPokemon===false?T('lMulligan',p):null;
    case 'TurnStart': return T('lTurnStart',p);
    case 'TurnEnd': return T('lTurnEnd',p);
    case 'Draw': return T('lDraw',p,nm(ev.cardId));
    case 'DrawReverse': return T('lDrawReverse',p);
    case 'MoveCard': return T('lMoveCard',p,nm(ev.cardId),area(ev.fromArea),area(ev.toArea));
    case 'MoveCardReverse': return T('lMoveCardReverse',p,area(ev.fromArea),area(ev.toArea));
    case 'Switch': return T('lSwitch',p,nm(ev.cardIdActive),nm(ev.cardIdBench));
    case 'Change': return T('lChange',p,nm(ev.cardIdBefore),nm(ev.cardIdAfter));
    case 'Play': return T('lPlay',p,nm(ev.cardId));
    case 'Attach': return T('lAttach',p,nm(ev.cardId),nm(ev.cardIdTarget));
    case 'Evolve': return T('lEvolve',p,nm(ev.cardIdTarget),nm(ev.cardId));
    case 'Devolve': return T('lDevolve',p,nm(ev.cardIdTarget),nm(ev.cardId));
    case 'MoveAttached': return T('lMoveAttached',p,nm(ev.cardId));
    case 'Attack': return `<span class="atk">${T('lAttack',p,nm(ev.cardId),ev.attackId)}</span>`;
    case 'HpChange': return `<span class="hp">${T('lHp',p,nm(ev.cardId),(ev.value>0?'+':'')+ev.value,ev.putDamageCounter?T('dmgCounter'):'')}</span>`;
    case 'Poisoned': case 'Burned': case 'Asleep': case 'Paralyzed': case 'Confused':{
      const sc={Poisoned:T('poisonedV'),Burned:T('burnedV'),Asleep:T('asleepV'),Paralyzed:T('paralyzedV'),Confused:T('confusedV')}[ev.type];
      return T('lStatus',p,nm(ev.cardId),sc,ev.isRecover?T('recover'):'');
    }
    case 'Coin': return T('lCoin',p,ev.head?T('heads'):T('tails'));
    case 'Result':{
      const who=ev.result===2?T('resDraw'):T('resWin',ev.result);
      return `<span class="res">${T('lResult',who,(I18N[LANG]||I18N.ja).reason[ev.reason]||('reason'+ev.reason))}</span>`;
    }
    default: return `${p}: ${ev.type} ${JSON.stringify(ev)}`;
  }
}
function describeSelected(s){
  if(!s.selected||!s.select) return '-';
  const opts=s.select.option||[];
  const parts=s.selected.map(i=>{
    const o=opts[i]; if(!o) return `#${i}`;
    let d=o.type; for(const f of ['index','area','inPlayArea','inPlayIndex','attackId','cardId','number']) if(o[f]!=null) d+=` ${f}=${o[f]}`;
    return `[${i}] ${d}`;
  });
  return `${s.select.type}/${s.select.context} → ${parts.join(' , ')}`;
}

// ---- header width pinning (keep the Next button from shifting as values change) ----
// The slider is the only flex:1 item, so its width — and thus the Next button after
// it — changes whenever ctx/step/turn change width. Reserve each field's max width.
function measureMax(el, candidates){
  const prev=el.textContent;
  el.style.display='inline-block'; el.style.minWidth='0';
  let max=0;
  for(const c of candidates){ el.textContent=c; if(el.offsetWidth>max) max=el.offsetWidth; }
  el.textContent=prev;
  el.style.minWidth=Math.ceil(max)+'px';
}
function pinHeaderWidths(){
  const ctxLabels=new Set(['-']);
  let maxTurn=0;
  for(const s of SNAP){
    ctxLabels.add((s.select&&s.select.context)||'-');
    const t=s.current&&s.current.turn;
    if(typeof t==='number'&&t>maxTurn) maxTurn=t;
  }
  measureMax(document.getElementById('ctx'), [...ctxLabels]);
  measureMax(document.getElementById('stepno'), [SNAP.length+'/'+SNAP.length]);
  measureMax(document.getElementById('turn'), ['-', String(maxTurn||1)]);
}

// ---- main render ----
function render(){
  const s=SNAP[idx], cur=s.current;
  document.getElementById('slider').value=idx;
  document.getElementById('stepno').textContent=`${idx+1}/${SNAP.length}`;
  document.getElementById('turn').textContent=cur.turn;
  document.getElementById('active').textContent='P'+cur.yourIndex;
  document.getElementById('ctx').textContent=(s.select&&s.select.context)||'-';
  const res=document.getElementById('result');
  res.innerHTML = cur.result>=0 ? `<b style="color:var(--hpgood)">RESULT: ${cur.result===2?T('draw'):T('win',cur.result)}</b>` : '';

  renderPlayer(document.getElementById('panel1'), cur.players[1], 'p1', cur.yourIndex===1);
  renderPlayer(document.getElementById('panel0'), cur.players[0], 'p0', cur.yourIndex===0);
  const stad=document.getElementById('stadium');
  if(cur.stadium&&cur.stadium.length){
    const sc=cur.stadium[0];
    stad.innerHTML=`🏟 ${T('stadium')}: <b>${sc.name||nm(sc.id)}</b>`;
    stad.setAttribute('data-id', sc.id);          // makes the line hoverable for the preview
  }else{
    stad.innerHTML=`🏟 ${T('stadium')}: ${T('none2')}`;
    stad.removeAttribute('data-id');
  }

  document.getElementById('selected').textContent=describeSelected(s);
  document.getElementById('log').innerHTML=(s.logs||[]).map(decode).filter(x=>x!=null).join('\n');

  document.getElementById('prev').disabled=idx===0;
  document.getElementById('next').disabled=idx===SNAP.length-1;
  if(zoomPi!==null) renderZoom();   // keep an open trash grid in sync while navigating
}

// ---- language toggle + initial apply ----
document.getElementById('langbtn').onclick=()=>setLang(LANG==='ja'?'en':'ja');
setLang(LANG);   // apply the current language to the static UI and set the toggle label


// ---- ptcg-card-viewer integration: remote Kaggle replay + JP card names ----
let __PTCG_JP_CARD_NAMES = null;
let __PTCG_TEAM_NAMES = [];
async function loadJpCardNames(){
  if(__PTCG_JP_CARD_NAMES) return __PTCG_JP_CARD_NAMES;
  try{
    const res = await fetch('cards_jp.json', {cache:'no-store'});
    __PTCG_JP_CARD_NAMES = await res.json();
  }catch(e){
    console.warn('cards_jp.json load failed', e);
    __PTCG_JP_CARD_NAMES = {};
  }
  return __PTCG_JP_CARD_NAMES;
}
function ptcgEscapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function playerLabel(index){
  const name = __PTCG_TEAM_NAMES[index];
  return name ? `P${index}: ${name}` : `P${index}`;
}
function playerLabelHtml(index){
  return ptcgEscapeHtml(playerLabel(index));
}
function extractTeamNames(data){
  const names = data?.info?.TeamNames;
  if(Array.isArray(names) && names.length) return names.map(name => String(name));
  const agents = data?.info?.Agents;
  if(Array.isArray(agents) && agents.length){
    return agents.map(agent => typeof agent === 'string' ? agent : String(agent?.Name || agent?.name || ''));
  }
  return [];
}
function localizeCardObject(obj, dict){
  if(!obj || typeof obj !== 'object') return;
  const id = obj.id ?? obj.cardId;
  if(id != null && dict[String(id)]){
    if(obj.name && !obj.nameEn) obj.nameEn = obj.name;
    obj.name = dict[String(id)];
  }
  for(const key of ['active','bench','hand','deck','discard','prize','stadium','energyCards','energies','tools','preEvolution']){
    const list = obj[key];
    if(Array.isArray(list)) for(const item of list) localizeCardObject(item, dict);
  }
}
function extractSnapshotsFromReplay(data){
  if(Array.isArray(data)) return data;
  if(Array.isArray(data?.visualize)) return data.visualize;
  for(const step of data?.steps || []){
    for(const entry of step || []){
      if(Array.isArray(entry?.visualize) && entry.visualize.length) return entry.visualize;
    }
  }
  throw new Error('visualize snapshot array was not found in replay JSON');
}
renderPlayer = function(el, ps, who, isTurn){
  const st=statusOf(ps);
  const playerIndex = who==='p0' ? 0 : 1;
  const benchHtml = (ps.bench&&ps.bench.length)
      ? ps.bench.map(b=>pokemonCard(b)).join('') : `<span class="hint">${T('noBench')}</span>`;
  const handHtml = (ps.hand&&ps.hand.length)
      ? ps.hand.map(c=>plainCard(c,true)).join('') : `<span class="hint">${T('noHand')}</span>`;
  el.className='player '+who+(isTurn?' turn':'');
  el.innerHTML=`
    <div class="prow">
      <span class="tag ${who}" title="${playerLabelHtml(playerIndex)}">${playerLabelHtml(playerIndex)}</span>
      ${isTurn?`<span class="turnflag">${T('turnFlag')}</span>`:''}
      <div class="counts">
        <span>${T('deck')} <b>${ps.deckCount}</b></span>
        <span>${T('hand')} <b>${ps.handCount}</b></span>
        <span>${T('prize')} <b>${ps.prize?ps.prize.length:0}</b></span>
        ${(ps.discard&&ps.discard.length)
          ? `<span class="zone-open" data-pi="${playerIndex}" title="${T('clickDiscard')}">${T('discard')} <b>${ps.discard.length}</b></span>`
          : `<span>${T('discard')} <b>0</b></span>`}
      </div>
    </div>
    <div class="prow" style="align-items:flex-end">
      <div>
        <div class="zone-label">${T('battle')}</div>
        <div class="cards">${(ps.active&&ps.active.length)?pokemonCard(ps.active[0],{active:true,status:st}):pokemonCard(null,{active:true})}</div>
      </div>
      <div style="flex:1">
        <div class="zone-label">${T('bench')} (${ps.bench?ps.bench.length:0}/${ps.benchMax})</div>
        <div class="cards">${benchHtml}</div>
      </div>
    </div>
    <div class="zone-label">${T('hand')}</div>
    <div class="cards">${handHtml}</div>`;
};
P = function(ev){ return ev.playerIndex!=null?playerLabel(ev.playerIndex):''; };
function cardDisplayName(card){
  if(!card) return null;
  return card.name || nm(card.id ?? card.cardId);
}
function cardsForArea(snapshot, areaId, playerIndex){
  const cur = snapshot.current || {};
  const player = (cur.players || [])[playerIndex];
  switch(areaId){
    case 1: return snapshot.select?.deck || [];
    case 2: return player?.hand || [];
    case 3: return player?.discard || [];
    case 4: return player?.active || [];
    case 5: return player?.bench || [];
    case 6: return player?.prize || [];
    case 7: return cur.stadium || [];
    case 12: return cur.looking || [];
    default: return [];
  }
}
function cardAtArea(snapshot, areaId, index, playerIndex){
  if(index == null) return null;
  const cards = cardsForArea(snapshot, areaId, playerIndex);
  return cards[index] || null;
}
function describeAreaCard(snapshot, areaId, index, playerIndex){
  const card = cardAtArea(snapshot, areaId, index, playerIndex);
  const name = cardDisplayName(card);
  const place = `${area(areaId)}${index != null ? index + 1 : ''}`;
  return name ? `${name}（${place}）` : `${place}`;
}
function describeInPlayCard(snapshot, areaId, index, playerIndex){
  const card = cardAtArea(snapshot, areaId, index, playerIndex);
  const name = cardDisplayName(card);
  const place = `${area(areaId)}${index != null ? index + 1 : ''}`;
  return name ? `${name}（${place}）` : `${place}`;
}
function optionExtra(o){
  const fields = [];
  for(const f of ['attackId','cardId','number']){
    if(o[f] != null) fields.push(`${f}=${o[f]}`);
  }
  return fields.length ? ` ${fields.join(' ')}` : '';
}
function describeOption(snapshot, optionIndex, option){
  const playerIndex = option.playerIndex ?? snapshot.current?.yourIndex ?? 0;
  const actor = playerLabel(playerIndex);
  const source = option.area != null
    ? describeAreaCard(snapshot, option.area, option.index, playerIndex)
    : null;
  const target = option.inPlayArea != null
    ? describeInPlayCard(snapshot, option.inPlayArea, option.inPlayIndex, playerIndex)
    : null;
  switch(option.type){
    case 'Attach':
      return `[${optionIndex}] ${actor}: ${source || 'カード'} を ${target || 'ポケモン'} に付ける`;
    case 'Evolve':
      return `[${optionIndex}] ${actor}: ${source || 'カード'} で ${target || 'ポケモン'} を進化`;
    case 'Ability':
      return `[${optionIndex}] ${actor}: ${(target || source || 'ポケモン')} の特性を使う${optionExtra(option)}`;
    case 'Attack':
      return `[${optionIndex}] ${actor}: ${(target || source || 'ポケモン')} でワザを使う${optionExtra(option)}`;
    case 'Energy':
      return `[${optionIndex}] ${actor}: ${(target || source || area(option.area))} のエネルギーを選択${optionExtra(option)}`;
    case 'Card':
      return `[${optionIndex}] ${actor}: ${source || 'カード'} を選択${optionExtra(option)}`;
    case 'Yes':
    case 'No':
      return `[${optionIndex}] ${option.type}`;
    default:{
      const raw = [];
      for(const f of ['index','area','inPlayArea','inPlayIndex','attackId','cardId','number']){
        if(option[f] != null) raw.push(`${f}=${option[f]}`);
      }
      return `[${optionIndex}] ${option.type}${raw.length ? ' ' + raw.join(' ') : ''}`;
    }
  }
}
describeSelected = function(s){
  if(!s.selected||!s.select) return '-';
  const opts=s.select.option||[];
  const parts=s.selected.map(i=>{
    const o=opts[i]; if(!o) return `#${i}`;
    return describeOption(s, i, o);
  });
  return `${s.select.type}/${s.select.context} → ${parts.join(' , ')}`;
};
render = function(){
  const s=SNAP[idx], cur=s.current;
  document.getElementById('slider').value=idx;
  document.getElementById('stepno').textContent=`${idx+1}/${SNAP.length}`;
  document.getElementById('turn').textContent=cur.turn;
  document.getElementById('active').textContent=playerLabel(cur.yourIndex);
  document.getElementById('ctx').textContent=(s.select&&s.select.context)||'-';
  const res=document.getElementById('result');
  res.innerHTML = cur.result>=0 ? `<b style="color:var(--hpgood)">RESULT: ${cur.result===2?T('draw'):T('win',playerLabel(cur.result))}</b>` : '';

  renderPlayer(document.getElementById('panel1'), cur.players[1], 'p1', cur.yourIndex===1);
  renderPlayer(document.getElementById('panel0'), cur.players[0], 'p0', cur.yourIndex===0);
  const stad=document.getElementById('stadium');
  if(cur.stadium&&cur.stadium.length){
    const sc=cur.stadium[0];
    stad.innerHTML=`🏟 ${T('stadium')}: <b>${sc.name||nm(sc.id)}</b>`;
    stad.setAttribute('data-id', sc.id);
  }else{
    stad.innerHTML=`🏟 ${T('stadium')}: ${T('none2')}`;
    stad.removeAttribute('data-id');
  }

  document.getElementById('selected').textContent=describeSelected(s);
  document.getElementById('log').innerHTML=(s.logs||[]).map(decode).filter(x=>x!=null).join('\n');

  document.getElementById('prev').disabled=idx===0;
  document.getElementById('next').disabled=idx===SNAP.length-1;
  if(zoomPi!==null) renderZoom();
};
const __PTCG_ORIGINAL_LOAD_TEXT = loadText;
loadText = async function(text){
  let data;
  try{ data = JSON.parse(text); }catch(e){ alert('JSON parse error: '+e); return; }
  let snapshots;
  try{ snapshots = extractSnapshotsFromReplay(data); }catch(e){ alert(e.message); return; }
  __PTCG_TEAM_NAMES = extractTeamNames(data);
  const dict = await loadJpCardNames();
  for(const snapshot of snapshots) localizeCardObject(snapshot, dict);
  __PTCG_ORIGINAL_LOAD_TEXT(JSON.stringify(snapshots));
};
async function loadRemoteReplayFromQuery(){
  const params = new URLSearchParams(location.search);
  const replayUrl = params.get('replay');
  if(!replayUrl) return;
  try{
    const hint = document.querySelector('#drop .hint');
    if(hint) hint.textContent = 'リプレイを読み込み中...';
    const res = await fetch(replayUrl, {cache:'no-store'});
    if(!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
    await loadText(await res.text());
  }catch(e){
    console.error(e);
    const hint = document.querySelector('#drop .hint');
    if(hint) hint.innerHTML = '読み込みに失敗しました: <code>'+String(e.message || e)+'</code>';
    alert('Replay load failed: '+(e.message || e));
  }
}
loadRemoteReplayFromQuery();
