<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PTCG AI Battle Replays</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 32px auto; padding: 0 18px; line-height: 1.55; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border-bottom: 1px solid #d0d7de; padding: 8px; text-align: left; }
    .muted { color: #667085; }
    details { border: 1px solid #d0d7de; border-radius: 12px; margin: 12px 0; padding: 8px 12px; }
    summary { cursor: pointer; font-weight: 700; }
    .submission { margin: 10px 0 0 18px; }
    .viewer-nav { display: flex; gap: 10px; margin-bottom: 18px; }
    .viewer-nav a { color: #2563eb; font-weight: 700; text-decoration: none; }
    .viewer-nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="viewer-nav">
    <a href="../">トップへ</a>
    <span>/</span>
    <a href="../card_list.html">カード一覧を見る</a>
  </nav>
  <h1>PTCG AI Battle Replays</h1>
  <p class="muted">Replay JSON は外部ストレージから読み込みます。</p>
  <div id="replays"></div>
  <script>
    const pagesUrl = "https://nenegazeuni.github.io/ptcg-card-viewer/";
    const replays = document.getElementById("replays");
    const fmt = new Intl.NumberFormat("ja-JP", { maximumFractionDigits: 1 });
    function groupBy(items, key) {
      return items.reduce((acc, item) => {
        const value = item[key] || "unknown";
        (acc[value] ||= []).push(item);
        return acc;
      }, {});
    }
    fetch(`manifest.json?ts=${Date.now()}`).then(r => r.json()).then(manifest => {
      const players = groupBy(manifest.items || [], "player");
      replays.innerHTML = Object.entries(players).map(([player, playerItems]) => {
        const submissions = groupBy(playerItems, "submission_id");
        const submissionHtml = Object.entries(submissions).map(([submissionId, items]) => {
          const rows = items.map(item => {
            const viewer = `${pagesUrl}replay_viewer.html?replay=${encodeURIComponent(item.url)}`;
            const mb = fmt.format((item.size_bytes || 0) / 1000000);
            return `<tr>
              <td>${item.episode_id}</td>
              <td>${item.opponent || "-"}</td>
              <td>${mb} MB</td>
              <td><a href="${viewer}">開く</a></td>
            </tr>`;
          }).join("");
          return `<details class="submission" open>
            <summary>submission ${submissionId}（${items.length} replays）</summary>
            <table>
              <thead><tr><th>Episode</th><th>Opponent</th><th>Size</th><th>Viewer</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </details>`;
        }).join("");
        return `<details open>
          <summary>${player}（${playerItems.length} replays）</summary>
          ${submissionHtml}
        </details>`;
      }).join("");
    });
  </script>
</body>
</html>
