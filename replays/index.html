<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PTCG AI Battle Replays</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 32px auto; padding: 0 18px; line-height: 1.55; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border-bottom: 1px solid #d0d7de; padding: 8px; text-align: left; }
    .muted { color: #667085; }
    details { border: 1px solid #d0d7de; border-radius: 12px; margin: 12px 0; padding: 8px 12px; }
    summary { cursor: pointer; font-weight: 700; }
    .submission { margin: 10px 0 0 18px; }
    .result { font-weight: 700; }
    .result-win { color: #15803d; }
    .result-loss { color: #b91c1c; }
    .result-draw { color: #92400e; }
    .result-unknown { color: #667085; }
    .viewer-nav { display: flex; gap: 10px; margin-bottom: 18px; }
    .viewer-nav a { color: #2563eb; font-weight: 700; text-decoration: none; }
    .viewer-nav a:hover { text-decoration: underline; }
    .filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0 18px; }
    .filters button { border: 1px solid #d0d7de; border-radius: 8px; background: #fff; cursor: pointer; font: inherit; font-weight: 700; padding: 7px 12px; }
    .filters button.active { border-color: #b91c1c; background: #fef2f2; color: #b91c1c; }
  </style>
</head>
<body>
  <nav class="viewer-nav">
    <a href="../">トップへ</a>
    <span>/</span>
    <a href="../card_list.html">カード一覧を見る</a>
  </nav>
  <h1>PTCG AI Battle Replays</h1>
  <p class="muted">Replay JSON は外部ストレージから読み込みます。</p>
  <div class="filters" aria-label="リプレイ絞り込み">
    <button type="button" class="active" data-filter="all">すべて</button>
    <button type="button" data-filter="loss">負けた試合だけ</button>
  </div>
  <div id="replays"></div>
  <script>
    const pagesUrl = "https://nenegazeuni.github.io/ptcg-card-viewer/";
    const replays = document.getElementById("replays");
    const filterButtons = [...document.querySelectorAll("[data-filter]")];
    let allReplayItems = [];
    let currentFilter = "all";
    const fmt = new Intl.NumberFormat("ja-JP", { maximumFractionDigits: 1 });
    const dateFmt = new Intl.DateTimeFormat("ja-JP", {
      dateStyle: "short",
      timeStyle: "short",
      hour12: false,
      timeZone: "Asia/Tokyo",
    });
    function parseTime(value) {
      if (!value) return null;
      const iso = value.includes("T") ? value : value.replace(" ", "T") + "Z";
      const date = new Date(iso);
      return Number.isNaN(date.getTime()) ? null : date;
    }
    function formatTime(value) {
      const date = parseTime(value);
      return date ? `${dateFmt.format(date)} JST` : "-";
    }
    function latestEpisodeTime(items) {
      const values = items.map(item => item.episode_create_time).filter(Boolean).sort();
      return values.length ? values[values.length - 1] : "";
    }
    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    }
    function resultLabel(result) {
      if (result === "win") return "勝ち";
      if (result === "loss") return "負け";
      if (result === "draw") return "引き分け";
      return "-";
    }
    function resultHtml(item) {
      const result = item.player_result || "unknown";
      const label = resultLabel(result);
      const title = item.winner && item.winner !== "draw" ? `勝者: ${item.winner}` : "";
      return `<span class="result result-${escapeHtml(result)}" title="${escapeHtml(title)}">${escapeHtml(label)}</span>`;
    }
    function resultSummary(items) {
      const counts = items.reduce((acc, item) => {
        acc[item.player_result || "unknown"] = (acc[item.player_result || "unknown"] || 0) + 1;
        return acc;
      }, {});
      const parts = [];
      if (counts.win) parts.push(`勝ち${counts.win}`);
      if (counts.loss) parts.push(`負け${counts.loss}`);
      if (counts.draw) parts.push(`引き分け${counts.draw}`);
      if (counts.unknown) parts.push(`不明${counts.unknown}`);
      return parts.length ? parts.join(" / ") : "結果なし";
    }
    function groupBy(items, key) {
      return items.reduce((acc, item) => {
        const value = item[key] || "unknown";
        (acc[value] ||= []).push(item);
        return acc;
      }, {});
    }
    function visibleItems() {
      if (currentFilter === "loss") {
        return allReplayItems.filter(item => item.player_result === "loss");
      }
      return allReplayItems;
    }
    function renderReplays() {
      const items = visibleItems();
      if (!items.length) {
        replays.innerHTML = '<p class="muted">該当するリプレイはありません。</p>';
        return;
      }
      const players = groupBy(items, "player");
      replays.innerHTML = Object.entries(players).map(([player, playerItems]) => {
        const submissions = groupBy(playerItems, "submission_id");
        const submissionHtml = Object.entries(submissions).map(([submissionId, submissionItems]) => {
          const rows = submissionItems.map(item => {
            const viewer = `${pagesUrl}replay_viewer.html?v=f0503ba&replay=${encodeURIComponent(item.url)}`;
            const mb = fmt.format((item.size_bytes || 0) / 1000000);
            return `<tr>
              <td>${item.episode_id}</td>
              <td>${formatTime(item.episode_create_time)}</td>
              <td>${resultHtml(item)}</td>
              <td>${item.opponent || "-"}</td>
              <td>${mb} MB</td>
              <td><a href="${viewer}">開く</a></td>
            </tr>`;
          }).join("");
          const submittedAt = formatTime(latestEpisodeTime(submissionItems));
          const results = resultSummary(submissionItems);
          return `<details class="submission" open>
            <summary>submission ${submissionId} / ${submittedAt} / ${results}（${submissionItems.length} replays）</summary>
            <table>
              <thead><tr><th>Episode</th><th>Time</th><th>Result</th><th>Opponent</th><th>Size</th><th>Viewer</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </details>`;
        }).join("");
        return `<details open>
          <summary>${player}（${playerItems.length} replays）</summary>
          ${submissionHtml}
        </details>`;
      }).join("");
    }
    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        currentFilter = button.dataset.filter || "all";
        filterButtons.forEach(item => item.classList.toggle("active", item === button));
        renderReplays();
      });
    });
    fetch(`manifest.json?ts=${Date.now()}`).then(r => r.json()).then(manifest => {
      allReplayItems = manifest.items || [];
      renderReplays();
    });
  </script>
</body>
</html>
